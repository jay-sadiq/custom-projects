# fly.toml app configuration file generated for trip-planner-app on Fly.io
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'trip-planner-app'
primary_region = 'iad'

[build]

[env]
  DJANGO_SETTINGS_MODULE = 'core.settings.prod'
  PORT = '8000'
  SECURE_SSL_REDIRECT = 'True'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/v1/health/"
    port = 8000
    timeout = "5s"
    type = "http"
