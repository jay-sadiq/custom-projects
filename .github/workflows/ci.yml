name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Migrate database
        run: uv run python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          uv run coverage run --source=itinerary manage.py test itinerary.tests
          uv run coverage report --include='itinerary/views.py' --fail-under=60
          uv run coverage report

      - name: Production deploy check
        env:
          DJANGO_SETTINGS_MODULE: core.settings.prod
          SECRET_KEY: ci-secret-key-with-sufficient-length-and-randomness-12345
          ALLOWED_HOSTS: example.com
          CSRF_TRUSTED_ORIGINS: https://example.com
        run: uv run python manage.py check --deploy
