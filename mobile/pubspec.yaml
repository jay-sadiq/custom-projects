name: trip_planner_app
description: AI trip planner companion app for iOS and Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_map: ^7.0.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^16.0.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#8B1A1A"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter_native_splash:
  color: "#8B1A1A"
  image: assets/icon/splash_icon.png
  android_12:
    color: "#8B1A1A"
    image: assets/icon/splash_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
