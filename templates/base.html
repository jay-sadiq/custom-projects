{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Travel Itinerary Planner{% endblock %}</title>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom Design Styles -->
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    
    <!-- Leaflet Map JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- HTMX for smooth partial html reloading -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    
    <!-- AlpineJS for client side state sync with Leaflet map -->
    <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
    
    <!-- SortableJS for drag-and-drop stop reordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    {% block content %}
    {% endblock %}

    <style>
        /* Calendar UI Styling */
        .calendar-timeline-grid {
            transition: background-color 0.2s;
        }
        .stop-block.calendar-tile {
            transition: border-color 0.2s, background-color 0.2s, transform 0.2s;
            border-radius: 12px !important;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
            user-select: none;
            -webkit-user-select: none;
        }
        .stop-block.calendar-tile.is-active {
            background: #FAF8F5 !important;
            border-left: 4px solid var(--color-crimson) !important;
        }
        .stop-block.calendar-tile.drag-over {
            border: 2px dashed var(--color-crimson) !important;
            background: rgba(139, 26, 26, 0.05) !important;
            transform: scale(0.99);
        }
        .resize-handle {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            cursor: ns-resize;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 20;
        }
        .resize-handle::after {
            content: '';
            width: 32px;
            height: 4px;
            background: rgba(15, 23, 42, 0.15);
            border-radius: 2px;
        }
        .resize-handle:hover::after {
            background: rgba(15, 23, 42, 0.35);
        }
        .drag-handle-bar {
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            color: var(--color-text-secondary);
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .drag-handle-bar:hover {
            opacity: 1;
        }
        .drag-handle-bar:active {
            cursor: grabbing;
        }
        .delete-photo-btn {
            transition: transform 0.2s, background-color 0.2s;
        }
        .delete-photo-btn:hover {
            background: #EF4444 !important;
            transform: scale(1.1);
        }
        /* Topnav User Profile link styling */
        .topnav-user {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.82rem;
        }
        .topnav-user .welcome-msg {
            color: var(--color-text-secondary);
            font-weight: 500;
        }
        .topnav-user .logout-btn {
            font-weight: 700;
            color: var(--color-crimson);
            padding: 6px 12px;
            border-radius: 16px;
            background: rgba(139, 26, 26, 0.06);
            border: 1px solid rgba(139, 26, 26, 0.15);
            transition: all 0.2s;
        }
        .topnav-user .logout-btn:hover {
            background: var(--color-crimson);
            color: #FFFFFF;
        }
    </style>

    <script>
    // AlpineJS controllers
    function stopCalendarTile(id, initialTop, initialHeight, initialStart, initialEnd) {
        return {
            id: id,
            topPx: initialTop,
            heightPx: initialHeight,
            startTime: initialStart,
            endTime: initialEnd,
            isDragging: false,
            isResizing: false,
            dragOver: false,
            startY: 0,
            startTop: 0,
            startHeight: 0,

            startDrag(e) {
                // Ignore if clicking interactive details
                if (e.target.closest('button') || e.target.closest('a') || e.target.closest('.reviews-trigger') || e.target.closest('.resize-handle') || e.target.closest('.edit-btn') || e.target.closest('.delete-photo-btn')) {
                    return;
                }
                e.preventDefault();
                this.isDragging = true;
                this.startY = e.clientY || (e.touches && e.touches[0].clientY);
                this.startTop = this.topPx;
                
                this.$el.style.zIndex = "100";
                
                const onPointerMove = (moveEvent) => {
                    if (!this.isDragging) return;
                    const currentY = moveEvent.clientY || (moveEvent.touches && moveEvent.touches[0].clientY);
                    const deltaY = currentY - this.startY;
                    
                    // Snap to 15 mins (20px)
                    let newTop = this.startTop + deltaY;
                    newTop = Math.round(newTop / 20) * 20;
                    
                    if (newTop < 0) newTop = 0;
                    if (newTop + this.heightPx > 1440) newTop = 1440 - this.heightPx;
                    
                    this.topPx = newTop;
                    this.updateTimesFromPixels();
                };

                const onPointerUp = async () => {
                    if (this.isDragging) {
                        this.isDragging = false;
                        this.$el.style.zIndex = "10";
                        window.removeEventListener('mousemove', onPointerMove);
                        window.removeEventListener('mouseup', onPointerUp);
                        window.removeEventListener('touchmove', onPointerMove);
                        window.removeEventListener('touchend', onPointerUp);
                        
                        await this.saveTimes();
                    }
                };

                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('mouseup', onPointerUp);
                window.addEventListener('touchmove', onPointerMove);
                window.addEventListener('touchend', onPointerUp);
            },

            startResize(e) {
                e.preventDefault();
                e.stopPropagation();
                this.isResizing = true;
                this.startY = e.clientY || (e.touches && e.touches[0].clientY);
                this.startHeight = this.heightPx;
                
                this.$el.style.zIndex = "100";

                const onPointerMove = (moveEvent) => {
                    if (!this.isResizing) return;
                    const currentY = moveEvent.clientY || (moveEvent.touches && moveEvent.touches[0].clientY);
                    const deltaY = currentY - this.startY;
                    
                    // Snap to 15 mins (20px)
                    let newHeight = this.startHeight + deltaY;
                    newHeight = Math.round(newHeight / 20) * 20;
                    
                    if (newHeight < 40) newHeight = 40; // min 30 min duration
                    if (this.topPx + newHeight > 1440) newHeight = 1440 - this.topPx;
                    
                    this.heightPx = newHeight;
                    this.updateTimesFromPixels();
                };

                const onPointerUp = async () => {
                    if (this.isResizing) {
                        this.isResizing = false;
                        this.$el.style.zIndex = "10";
                        window.removeEventListener('mousemove', onPointerMove);
                        window.removeEventListener('mouseup', onPointerUp);
                        window.removeEventListener('touchmove', onPointerMove);
                        window.removeEventListener('touchend', onPointerUp);
                        
                        await this.saveTimes();
                    }
                };

                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('mouseup', onPointerUp);
                window.addEventListener('touchmove', onPointerMove);
                window.addEventListener('touchend', onPointerUp);
            },

            updateTimesFromPixels() {
                // 06:00 AM is 360 mins, 80px = 60 mins
                const startMins = Math.round(this.topPx * 60 / 80) + 360;
                const endMins = startMins + Math.round(this.heightPx * 60 / 80);
                
                this.startTime = this.formatMinsToTime(startMins);
                this.endTime = this.formatMinsToTime(endMins);
                
                const label = this.$el.querySelector('.stop-time-text');
                if (label) {
                    label.innerText = this.formatMinsToDisplay(startMins) + ' - ' + this.formatMinsToDisplay(endMins);
                }
            },

            formatMinsToTime(mins) {
                const h = Math.floor(mins / 60);
                const m = mins % 60;
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            },

            formatMinsToDisplay(mins) {
                let h = Math.floor(mins / 60);
                const m = mins % 60;
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12;
                if (h === 0) h = 12;
                return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
            },

            async saveTimes() {
                const formData = new FormData();
                formData.append('start_time', this.startTime);
                formData.append('end_time', this.endTime);
                
                try {
                    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
                    const response = await fetch(`/stop/${this.id}/update-times/`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': csrfToken
                        },
                        body: formData
                    });
                    const data = await response.json();
                    if (data.status === 'success') {
                        htmx.trigger('#dayPanel', 'refresh-stops');
                    }
                } catch (err) {
                    console.error("Error updating stop times:", err);
                }
            },

            handleDrop(e) {
                this.dragOver = false;
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        if (file.type.startsWith('image/')) {
                            this.uploadPhoto(file);
                        }
                    }
                }
            },

            async uploadPhoto(file) {
                const formData = new FormData();
                formData.append('photo', file);
                
                try {
                    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
                    const response = await fetch(`/stop/${this.id}/upload-photo/`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': csrfToken
                        },
                        body: formData
                    });
                    const data = await response.json();
                    if (data.status === 'success') {
                        htmx.trigger('#dayPanel', 'refresh-stops');
                    } else {
                        alert("Upload failed: " + data.message);
                    }
                } catch (err) {
                    console.error("Error uploading photo:", err);
                }
            },

            async deletePhoto(photoId, event) {
                if (event) event.stopPropagation();
                if (!confirm("Are you sure you want to delete this photo?")) return;
                
                try {
                    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
                    const response = await fetch(`/photo/${photoId}/delete/`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': csrfToken
                        }
                    });
                    const data = await response.json();
                    if (data.status === 'success') {
                        htmx.trigger('#dayPanel', 'refresh-stops');
                    }
                } catch (err) {
                    console.error("Error deleting photo:", err);
                }
            }
        };
    }
    </script>

    {% block extra_js %}
    {% endblock %}
    
</body>
</html>
