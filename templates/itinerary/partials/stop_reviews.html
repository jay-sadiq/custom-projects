{% if photos %}
<div class="photo-gallery">
    {% for photo in photos %}
        {% if photo.type == 'google_ref' %}
        <img src="{% url 'proxy_place_photo' stop.id forloop.counter0 %}" alt="{{ stop.title }} photo">
        {% else %}
        <img src="{{ photo.url }}" alt="{{ stop.title }} photo">
        {% endif %}
    {% endfor %}
</div>
{% endif %}

<div style="font-weight: 700; margin-bottom: 8px;">Google Rating: {{ place_detail.rating }} ★</div>

{% for rev in place_detail.reviews_json %}
<div class="review-item">
    <div class="review-author">
        <span>{{ rev.author }}</span>
        <span>{{ rev.rating }} / 5</span>
    </div>
    <div class="review-text">{{ rev.text }}</div>
</div>
{% endfor %}
